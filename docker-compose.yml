services:
  drewgent-gateway:
    image: humanerdkr/drewgent:latest
    container_name: drewgent-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/opt/data
      - /Users/drew/.drewgent:/root/.drewgent:rw
      - /Volumes/drewgent_storage:/nas:ro
      # Source code volume mounts - code changes reflect immediately
      - ./agent:/opt/drewgent/agent:ro
      - ./gateway:/opt/drewgent/gateway:ro
      - ./modules:/opt/drewgent/modules:ro
    env_file:
      - /Users/drew/.drewgent/.env
    environment:
      - HERMES_HOME=/opt/data
      - PYTHONPATH=/opt/drewgent
    entrypoint: ["bash", "-c", "cd /opt/drewgent && mkdir -p /opt/data/{cron,sessions,logs,hooks,memories,skills} && exec python3 -m drewgent_cli.main gateway run"]

  drewgent-agent:
    image: humanerdkr/drewgent:latest
    container_name: drewgent-agent
    restart: unless-stopped
    network_mode: host
    entrypoint: ["bash", "-c", "cd /opt/drewgent && mkdir -p /opt/data/{cron,sessions,logs,hooks,memories,skills} && exec python3 cli.py agent run"]
    volumes:
      - ./data:/opt/data
      - /Users/drew/.drewgent:/root/.drewgent:rw
      - /Volumes/drewgent_storage:/nas:ro
      # Source code volume mounts - code changes reflect immediately
      - ./agent:/opt/drewgent/agent:ro
      - ./gateway:/opt/drewgent/gateway:ro
      - ./modules:/opt/drewgent/modules:ro
    env_file:
      - /Users/drew/.drewgent/.env
    environment:
      - HERMES_HOME=/opt/data
      - PYTHONPATH=/opt/drewgent
    depends_on:
      - drewgent-gateway

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    volumes:
      - /Users/drew/.cloudflared:/etc/cloudflared:ro
    network_mode: host

  monitor:
    image: humanerdkr/drewgent-monitor:latest
    container_name: drewgent-monitor
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/opt/data
    environment:
      - GATEWAY_URL=http://localhost:8642
      - DREW_DISCORD_WEBHOOK=https://discord.com/api/webhooks/1493982481974693990/i2UZEZrn0pVY75DT1O-0rLIvVjZjSkty7taJFtMOWJXkCkXWYqSlWybNUylJGKndAuio
    entrypoint: ["python3", "/usr/local/bin/drewgent_monitor.py"]